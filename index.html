<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>슈니스 일정</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FRXFPKJ1CF"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-FRXFPKJ1CF');
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f5f2eb; --surface: #ffffff; --surface2: #faf8f4;
            --border: #e0dbd0; --text: #1a1a1a; --text-sub: #6b6560; --text-hint: #a8a39a;
            --accent: #2d6a4f; --accent-light: #d8ede4; --accent-mid: #52b788;
            --red: #c1440e; --yellow: #e07a00; --yellow-light: #fef3d6;
            --court4: #7c4dbd; --court4-light: #ede8f8;
            --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
        
        /* Loading */
        #loading { position: fixed; inset: 0; background: rgba(45,106,79,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 16px; }
        #loading.hidden { display: none; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: white; font-size: 14px; font-weight: 500; }

        .header { background: var(--accent); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header-title { color: white; font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
        .header-title span { font-weight: 300; opacity: 0.75; margin-right: 6px; font-size: 13px; }
        .month-nav { display: flex; align-items: center; gap: 12px; color: white; }
        .month-nav button { background: rgba(255,255,255,0.18); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
        .month-label { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; min-width: 80px; text-align: center; }

        .main { max-width: 1060px; margin: 0 auto; padding: 24px 16px; display: grid; grid-template-columns: 1fr 360px; gap: 20px; align-items: start; }
        @media (max-width: 780px) { .main { grid-template-columns: 1fr; padding: 12px 10px; } }

        /* Calendar */
        .calendar-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
        .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--surface2); border-bottom: 1px solid var(--border); }
        .cal-header div { text-align: center; padding: 10px 0; font-size: 11px; font-weight: 500; color: var(--text-sub); }
        .cal-header div:first-child { color: var(--red); }
        .cal-header div:last-child { color: #4472b8; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
        .cal-day { min-height: 72px; padding: 6px 4px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; position: relative; }
        .cal-day:nth-child(7n) { border-right: none; }
        .cal-day.today .day-num { background: var(--accent); color: white; border-radius: 50%; }
        .cal-day.selected { background: #edf7f2; }
        .day-num { font-size: 12px; font-weight: 500; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 3px; }
        
        /* Events & Chips */
        .event-chip { font-size: 9px; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .court-1 { background: var(--accent-light); color: var(--accent); }
        .court-2 { background: var(--yellow-light); color: var(--yellow); }
        .court-3 { background: #e8eaf6; color: #3949ab; }
        .court-4 { background: var(--court4-light); color: var(--court4); }
        .court-etc { background: #f1efe8; color: #5f5e5a; }

        /* Status & Members Grid (Mobile Optimized) */
        .member-grid, #members-overview, #paid-overview, #yearly-overview { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px 6px; 
            margin-bottom: 4px; 
        }
        .member-chip, .roster-chip { 
            font-size: 12px; 
            padding: 6px 12px; 
            border-radius: 20px; 
            background: var(--surface2); 
            border: 1.5px solid var(--border); 
            color: var(--text-sub); 
            white-space: nowrap; 
            display: inline-flex; 
            align-items: center; 
            font-weight: 500;
        }
        .member-chip.attending { background: var(--accent-light); border-color: #8ecdb2; color: var(--accent); }
        
        @media (max-width: 480px) {
            .member-chip, .roster-chip { font-size: 11px; padding: 5px 10px; }
            .card-body { padding: 12px 10px; } /* 추가팁 반영: 좌우 패딩 축소 */
        }

        /* Forms & Cards */
        .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px; }
        .card-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .card-head h3 { font-size: 13px; font-weight: 600; }
        .card-body { padding: 14px 16px; }
        .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--accent-light); color: var(--accent); font-weight: 500; }
        
        .form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
        .form-label { font-size: 11px; color: var(--text-sub); font-weight: 600; }
        .form-input, .form-select { border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 14px; width: 100%; outline: none; background: var(--surface2); }
        .btn-primary { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 12px; font-weight: 600; cursor: pointer; width: 100%; }

        /* Modal */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-backdrop.hidden { display: none; }
        .modal-box { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 500px; }
        .memo-textarea { width: 100%; height: 200px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; resize: none; }
    </style>
</head>
<body>

<div id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">슈니스 불러오는 중...</div>
</div>

<div class="header">
    <div class="header-title"><span>🎾</span> SSU Tennis, SSUNISS!!</div>
    <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="month-label">2026.03</div>
        <button onclick="changeMonth(1)">›</button>
    </div>
</div>

<div class="main">
    <div>
        <div class="calendar-wrap">
            <div class="cal-header">
                <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
        </div>
        
        <div style="margin-top:15px; display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
            <button id="memo-btn" onclick="openMemo()" style="font-size:12px; font-weight:600; color:#3949ab; background:#e8eaf6; border:1px solid #9fa8da; border-radius:20px; padding:6px 12px; cursor:pointer;">
                📝 <span id="memo-btn-label">3월 메모</span>
            </button>
            <a href="https://booking.gwanakgongdan.or.kr/booking/1515" target="_blank" style="font-size:12px; color:var(--accent); font-weight:600; text-decoration:none; padding:6px 12px; background:var(--accent-light); border-radius:20px;">🔗 코트 예약 링크</a>
        </div>
        <div style="margin-top:10px; font-size:12px; color:var(--red); font-weight:500;">
            📌 예약: 1~15일 / 추첨: 18일 / 결제: 22일 9시 마감
        </div>
    </div>

    <div class="panel">
        <div class="card">
            <div class="card-head">
                <h3>일정 상세</h3>
                <span class="badge" id="event-count-badge">0개</span>
            </div>
            <div class="card-body">
                <div id="detail-date" style="font-size:20px; font-weight:700; color:var(--accent); font-family:'DM Mono';">날짜 선택</div>
                <div id="events-detail" style="margin-top:10px;">
                    <div style="color:var(--text-hint); text-align:center; padding:20px;">날짜를 클릭해 참여자를 관리하세요.</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-head"><h3>일정 추가</h3></div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-label">날짜</div>
                    <input type="date" id="new-date" class="form-input">
                </div>
                <div class="form-row">
                    <div class="form-label">코트</div>
                    <select id="new-court" class="form-select">
                        <option value="1">1코트</option><option value="2">2코트</option>
                        <option value="3">3코트</option><option value="4">4코트</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-label">예약(결제)자 성명</div> <input type="text" id="new-memo" class="form-input" placeholder="성명을 입력하세요">
                </div>
                <button class="btn-primary" onclick="addEvent()">+ 일정 등록</button>
            </div>
        </div>

        <div class="card">
            <div class="card-head">
                <h3>🎾 <span id="current-month-title">3월</span> 참여현황</h3> <span class="badge" id="member-count-badge">0명</span>
            </div>
            <div class="card-body" id="members-overview"></div>
        </div>

        <div class="card">
            <div class="card-head">
                <h3>💳 결제완료 현황</h3>
                <span class="badge" id="paid-count-badge" style="background:#d1e7dd; color:#0a5c36;">0명</span>
            </div>
            <div class="card-body" id="paid-overview"></div>
        </div>
    </div>
</div>

<div class="modal-backdrop hidden" id="memo-modal">
    <div class="modal-box">
        <div class="card-head">
            <h3 id="memo-modal-title">3월 메모</h3>
            <button onclick="closeMemo()" style="background:none; border:none; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        <div class="card-body">
            <textarea id="memo-textarea" class="memo-textarea" placeholder="특이사항을 입력하세요"></textarea>
            <button class="btn-primary" style="margin-top:10px;" onclick="saveMemo()">저장하기</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://unlvmtixzhvzxfexynri.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVubHZtdGl4emh2enhmZXh5bnJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTMzMzQsImV4cCI6MjA4OTgyOTMzNH0.ZhATMOOT7fBg3iFcofXaWCF2tstV5rYka-Ae5R3YnF0';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let selectedDate = null;
    let events = {};
    let masterRoster = [];

    async function init() {
        showLoading();
        const { data: rosterData } = await sb.from('roster').select('name').order('sort_order');
        masterRoster = rosterData.map(r => r.name);
        await loadData();
        hideLoading();
    }

    async function loadData() {
        const y = currentYear, m = String(currentMonth + 1).padStart(2, '0');
        const from = `${y}-${m}-01`, to = `${y}-${m}-31`;
        
        const { data: sched } = await sb.from('schedules').select('*').gte('date', from).lte('date', to);
        const { data: slots } = await sb.from('slots').select('*').gte('date', from).lte('date', to);

        events = {};
        (sched || []).forEach(s => events[s.date] = { members: s.members || [], slots: [] });
        (slots || []).forEach(s => {
            if(!events[s.date]) events[s.date] = { members: [], slots: [] };
            events[s.date].slots.push(s);
        });

        updateUI();
    }

    function updateUI() {
        const displayMonth = currentMonth + 1;
        document.getElementById('month-label').textContent = `${currentYear}.${String(displayMonth).padStart(2,'0')}`;
        document.getElementById('current-month-title').textContent = `${displayMonth}월`;
        document.getElementById('memo-btn-label').textContent = `${displayMonth}월 메모`;
        document.getElementById('memo-modal-title').textContent = `${displayMonth}월 메모`;
        
        renderCalendar();
        renderMembersOverview();
    }

    function renderCalendar() {
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        let html = '';

        for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toISOString().split('T')[0] === dateStr;
            const dayEvents = events[dateStr]?.slots || [];
            
            html += `<div class="cal-day ${isToday?'today':''} ${dateStr===selectedDate?'selected':''}" onclick="selectDate('${dateStr}')">
                <div class="day-num">${d}</div>
                ${dayEvents.map(e => `<div class="event-chip court-${e.court}">${e.court}코트 ${e.start_time}</div>`).join('')}
            </div>`;
        }
        document.getElementById('cal-grid').innerHTML = html;
    }

    function selectDate(date) {
        selectedDate = date;
        renderCalendar();
        const detail = events[date] || { members: [], slots: [] };
        document.getElementById('detail-date').textContent = date;
        
        let html = '<div class="member-grid">';
        masterRoster.forEach(name => {
            const isAttending = detail.members.includes(name);
            html += `<div class="member-chip ${isAttending?'attending':''}" onclick="toggleAttendance('${name}')">${name}</div>`;
        });
        html += '</div>';
        document.getElementById('events-detail').innerHTML = html;
    }

    async function toggleAttendance(name) {
        if(!selectedDate) return;
        let members = events[selectedDate]?.members || [];
        if(members.includes(name)) members = members.filter(m => m !== name);
        else members.push(name);

        const { error } = await sb.from('schedules').upsert({ date: selectedDate, members: members }, { onConflict: 'date' });
        if(!error) {
            if(!events[selectedDate]) events[selectedDate] = { members: [], slots: [] };
            events[selectedDate].members = members;
            selectDate(selectedDate);
            renderMembersOverview();
        }
    }

    function renderMembersOverview() {
        const counts = {};
        Object.values(events).forEach(e => {
            e.members.forEach(m => counts[m] = (counts[m] || 0) + 1);
        });

        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
        document.getElementById('members-overview').innerHTML = sorted.map(([name, count]) => 
            `<div class="member-chip attending">${name} <span style="margin-left:4px; font-size:10px; opacity:0.7;">${count}회</span></div>`
        ).join('') || '<div style="color:var(--text-hint); font-size:12px;">참여 데이터가 없습니다.</div>';
    }

    async function addEvent() {
        const date = document.getElementById('new-date').value;
        const court = document.getElementById('new-court').value;
        const memo = document.getElementById('new-memo').value;
        if(!date) return alert('날짜를 선택하세요');

        showLoading('등록 중...');
        await sb.from('slots').insert([{ date, court, memo, start_time: '18:00', end_time: '20:00' }]);
        await loadData();
        hideLoading();
    }

    function changeMonth(diff) {
        currentMonth += diff;
        if(currentMonth < 0) { currentMonth = 11; currentYear--; }
        if(currentMonth > 11) { currentMonth = 0; currentYear++; }
        loadData();
    }

    function openMemo() { document.getElementById('memo-modal').classList.remove('hidden'); }
    function closeMemo() { document.getElementById('memo-modal').classList.add('hidden'); }
    function showLoading(msg) { document.getElementById('loading').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

    init();
</script>
</body>
</html>
